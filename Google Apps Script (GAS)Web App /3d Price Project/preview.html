<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Price Library - Project Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
  :root {
    /* Vibrant Nocturnal Atelier Aesthetic */
    --bg-base: #050505;
    --bg-surface: #111111;
    --bg-surface-hover: #1a1a1a;
    
    --text-primary: #f2f2f2;
    --text-secondary: #a0a0a0;
    
    --accent-primary: #d4af37; 
    --accent-highlight: #2563eb; 
    --accent-danger: #ef4444;
    --accent-success: #10b981;
    
    /* Tonal shifts instead of borders */
    --tonal-border: #222222;
    --tonal-border-focus: #444444;

    --font-main: 'Outfit', sans-serif;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    border-radius: 0 !important;
  }

  body {
    background-color: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-main);
    line-height: 1.6;
    min-height: 100vh;
    padding: 2rem;
  }

  .app-container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .app-header {
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--tonal-border);
    padding-bottom: 1rem;
  }

  .app-header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .app-header p {
    color: var(--text-secondary);
    font-weight: 300;
  }

  .content-grid {
    display: flex;
    flex-direction: column;
    gap: 3rem;
  }

  .module-card {
    background-color: var(--bg-surface);
    padding: 2rem;
    position: relative;
    box-shadow: 0 0 0 1px var(--tonal-border);
  }
  
  .project-card {
    margin-bottom: 3rem;
    background-color: rgba(37, 99, 235, 0.05); /* very subtle highlight for main project */
    box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.3);
  }

  .project-header-layout {
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .visual-hierarchy-layout {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 2rem;
    align-items: stretch;
    margin-bottom: 2rem;
  }

  .vertical-title {
    background-color: var(--bg-surface-hover);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem 0;
    box-shadow: 0 0 0 1px var(--tonal-border);
  }

  .vertical-title h2 {
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    font-size: 1.5rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .form-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1.5rem;
  }

  .input-row {
    display: grid;
    gap: 1rem;
  }

  .input-row.triple { grid-template-columns: repeat(3, 1fr); }
  .align-end { align-items: flex-end; }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .input-group label {
    font-size: 0.85rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
  }

  .input-group input {
    background-color: var(--bg-base);
    border: none;
    box-shadow: 0 0 0 1px var(--tonal-border);
    color: var(--text-primary);
    padding: 0.8rem 1rem;
    font-family: var(--font-main);
    font-size: 1rem;
    transition: box-shadow 0.3s ease;
  }

  .input-group input:focus {
    outline: none;
    box-shadow: 0 0 0 1px var(--accent-highlight);
  }

  .total-display {
    background-color: var(--bg-surface-hover);
    padding: 0.5rem;
    box-shadow: 0 0 0 1px var(--accent-highlight);
    height: 100%;
    display: flex;
    justify-content: center;
  }

  .total-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent-highlight);
  }

  .btn-submit, .btn-add {
    background-color: var(--text-primary);
    color: var(--bg-base);
    border: none;
    padding: 0.8rem 2rem;
    font-family: var(--font-main);
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-submit:hover, .btn-add:hover {
    background-color: var(--accent-highlight);
    color: #fff;
  }

  .btn-add {
    background-color: var(--bg-surface-hover);
    color: var(--text-primary);
    box-shadow: 0 0 0 1px var(--tonal-border);
  }

  .btn-add:hover {
    box-shadow: 0 0 0 1px var(--accent-highlight);
  }

  .mega-btn {
    width: 100%;
    padding: 1.5rem;
    font-size: 1.2rem;
    background-color: var(--accent-success);
    color: var(--bg-base);
  }
  
  .mega-btn:hover {
    background-color: #0ea5e9;
  }

  .btn-remove {
    background: none;
    border: none;
    color: var(--accent-danger);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0.2rem 0.5rem;
  }

  .btn-remove:hover {
    background-color: rgba(239, 68, 68, 0.1);
  }

  .btn-row {
    display: flex;
    justify-content: flex-end;
  }
  
  .full-width {
    justify-content: stretch;
  }

  /* Table styling */
  .table-wrapper {
    overflow-x: auto;
    margin-top: 1rem;
    box-shadow: 0 0 0 1px var(--tonal-border);
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 0.9rem;
  }

  .data-table th, .data-table td {
    padding: 1rem;
    border-bottom: 1px solid var(--tonal-border);
  }

  .data-table th {
    background-color: var(--bg-base);
    color: var(--text-secondary);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .data-table tbody tr:hover {
    background-color: var(--bg-surface-hover);
  }
  
  .empty-state td {
    text-align: center;
    color: var(--text-secondary);
    font-style: italic;
    padding: 2rem !important;
  }

  .totals-row td {
    font-weight: 700;
    color: var(--text-primary);
    background-color: rgba(255, 255, 255, 0.02);
    border-top: 2px solid var(--tonal-border-focus);
    border-bottom: none;
  }
  
  .totals-row td:first-child {
    color: var(--text-secondary);
    letter-spacing: 1px;
  }
  
  .link-cell a {
    color: var(--accent-highlight);
    text-decoration: none;
  }
  .link-cell a:hover {
    text-decoration: underline;
  }

  /* Loading Overlay */
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(5, 5, 5, 0.8);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    backdrop-filter: blur(4px);
  }

  .loading-overlay.hidden {
    display: none;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--tonal-border);
    border-top-color: var(--accent-highlight);
    animation: spin 1s linear infinite;
    margin-bottom: 1rem;
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }

  /* Responsive adjustments */
  @media (max-width: 900px) {
    .input-row.triple { grid-template-columns: 1fr; }
    
    .visual-hierarchy-layout {
      grid-template-columns: 1fr;
    }
    
    .vertical-title h2 {
      writing-mode: horizontal-tb;
      transform: none;
      letter-spacing: 2px;
    }
  }
</style>

</head>
<body>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>

  <div class="app-container">
    <header class="app-header">
      <h1>3D Price Library</h1>
      <p>Dynamic Project Estimator</p>
    </header>

    <!-- Global Project Header -->
    <section class="module-card project-card">
      <div class="project-header-layout">
        <div class="input-row triple align-end">
          <div class="input-group">
            <label for="projectName">Project Name</label>
            <input type="text" id="projectName" placeholder="Enter project name" required>
          </div>
          <div class="input-group">
            <label for="projectLink">Project Link</label>
            <input type="url" id="projectLink" placeholder="https://...">
          </div>
          <div class="input-group highlight-input total-display">
            <label>Grand Total Cost</label>
            <div id="grandTotalDisplay" class="total-value">€0.00</div>
          </div>
        </div>
        <div class="btn-row full-width">
          <button id="saveProjectBtn" class="btn-submit mega-btn">Save Entire Project</button>
        </div>
      </div>
    </section>

    <main class="content-grid">
      
      <!-- Section 1: 3D Plates -->
      <section class="module-card">
        <div class="visual-hierarchy-layout">
          <div class="vertical-title">
            <h2>3D Plates</h2>
          </div>
          
          <div class="form-container">
            <div class="input-row triple">
              <div class="input-group">
                <label for="plateGrams">Grams</label>
                <input type="number" id="plateGrams" placeholder="0.00" step="0.01" min="0">
              </div>
              <div class="input-group">
                <label for="plateCost">Cost</label>
                <input type="number" id="plateCost" placeholder="€0.00" step="0.01" min="0">
              </div>
              <div class="input-group">
                <label for="plateTime">Time</label>
                <input type="text" id="plateTime" placeholder="e.g., 1h 30m">
              </div>
            </div>
            <div class="btn-row">
              <button id="addPlateBtn" class="btn-add">+ Add Plate</button>
            </div>
          </div>
        </div>

        <!-- Current Plates Table -->
        <div class="table-wrapper current-items-table">
          <table id="platesTable" class="data-table">
            <thead>
              <tr>
                <th>Plate N.º</th>
                <th>Grams</th>
                <th>Cost</th>
                <th>Time</th>
                <th style="width: 80px; text-align: center;">Action</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
              <tr class="empty-state"><td colspan="5">No plates added yet.</td></tr>
            </tbody>
            <tfoot>
              <tr class="totals-row">
                <td>TOTAL 3D</td>
                <td id="totPlateGrams">0.00g</td>
                <td id="totPlateCost">€0.00</td>
                <td id="totPlateTime">0m</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </section>

      <!-- Section 2: Items Not 3D -->
      <section class="module-card">
        <div class="visual-hierarchy-layout">
          <div class="vertical-title">
            <h2>Items Not 3D</h2>
          </div>
          
          <div class="form-container">
            <div class="input-row triple">
              <div class="input-group">
                <label for="itemLink">Link</label>
                <input type="url" id="itemLink" placeholder="https://...">
              </div>
              <div class="input-group">
                <label for="itemQty">Quantity (N.º)</label>
                <input type="number" id="itemQty" placeholder="1" min="1" value="1">
              </div>
              <div class="input-group">
                <label for="itemCost">Cost per Item</label>
                <input type="number" id="itemCost" placeholder="€0.00" step="0.01" min="0">
              </div>
            </div>
            <div class="btn-row">
              <button id="addItemBtn" class="btn-add">+ Add Item</button>
            </div>
          </div>
        </div>

        <!-- Current Items Table -->
        <div class="table-wrapper current-items-table">
          <table id="itemsTable" class="data-table">
            <thead>
              <tr>
                <th>Item Link</th>
                <th>Quantity</th>
                <th>Unit Cost</th>
                <th>Total Cost</th>
                <th style="width: 80px; text-align: center;">Action</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
              <tr class="empty-state"><td colspan="5">No items added yet.</td></tr>
            </tbody>
            <tfoot>
              <tr class="totals-row">
                <td>TOTAL ITEMS</td>
                <td id="totItemQty">0</td>
                <td>-</td>
                <td id="totItemCost">€0.00</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </section>

    </main>
  </div>

  <script>
  // ==========================================
  // 1. Mock Environment for Local Development
  // ==========================================
  if (typeof window.google === 'undefined') {
    console.info("Initializing fallback mocked google.script environment for local preview.");
    
    window.google = {
      script: {
        run: {
          withSuccessHandler: function(cb) {
            return {
              withFailureHandler: function(errCb) {
                return {
                  saveProject: function(payload) {
                    console.log("Mock saved Project:", payload);
                    setTimeout(() => cb(true), 800);
                  }
                };
              }
            };
          }
        }
      }
    };
  }

  // ==========================================
  // 2. Application State & Models
  // ==========================================
  
  const state = {
    projectName: '',
    projectLink: '',
    plates: [],
    items: [],
    totals: {
      platesGrams: 0,
      platesCost: 0,
      platesTimeMins: 0,
      itemsQty: 0,
      itemsCost: 0,
      grandTotalCost: 0
    }
  };

  const UI = {
    showLoading: () => document.getElementById('loadingOverlay').classList.remove('hidden'),
    hideLoading: () => document.getElementById('loadingOverlay').classList.add('hidden'),
    showError: (err) => {
      UI.hideLoading();
      alert("An error occurred: " + err.message);
      console.error(err);
    },
    formatCurrency: (value) => '€' + parseFloat(value || 0).toFixed(2),
    formatGrams: (value) => parseFloat(value || 0).toFixed(2) + 'g',
    parseTimeToMins: (timeStr) => {
      if (!timeStr) return 0;
      let mins = 0;
      const hMatch = timeStr.match(/(\d+)\s*h/i);
      const mMatch = timeStr.match(/(\d+)\s*m/i);
      if (hMatch) mins += parseInt(hMatch[1]) * 60;
      if (mMatch) mins += parseInt(mMatch[1]);
      if (!hMatch && !mMatch && !isNaN(timeStr)) mins += parseInt(timeStr); // fallback to raw minutes
      return mins;
    },
    formatMinsToTime: (totalMins) => {
      const h = Math.floor(totalMins / 60);
      const m = Math.floor(totalMins % 60);
      if (h > 0 && m > 0) return `${h}h ${m}m`;
      if (h > 0) return `${h}h`;
      return `${m}m`;
    }
  };

  // ==========================================
  // 3. Logic & Calculations
  // ==========================================

  function calculateTotals() {
    // Calculate Plates
    state.totals.platesGrams = state.plates.reduce((sum, p) => sum + parseFloat(p.grams || 0), 0);
    state.totals.platesCost = state.plates.reduce((sum, p) => sum + parseFloat(p.cost || 0), 0);
    state.totals.platesTimeMins = state.plates.reduce((sum, p) => sum + p.timeMins, 0);

    // Calculate Items
    state.totals.itemsQty = state.items.reduce((sum, i) => sum + parseInt(i.qty || 0), 0);
    state.totals.itemsCost = state.items.reduce((sum, i) => sum + (parseInt(i.qty || 0) * parseFloat(i.unitCost || 0)), 0);

    // Grand Total
    state.totals.grandTotalCost = state.totals.platesCost + state.totals.itemsCost;

    renderTotals();
  }

  function renderTotals() {
    // 3D Table Totals
    document.getElementById('totPlateGrams').textContent = UI.formatGrams(state.totals.platesGrams);
    document.getElementById('totPlateCost').textContent = UI.formatCurrency(state.totals.platesCost);
    document.getElementById('totPlateTime').textContent = UI.formatMinsToTime(state.totals.platesTimeMins);

    // Items Table Totals
    document.getElementById('totItemQty').textContent = state.totals.itemsQty;
    document.getElementById('totItemCost').textContent = UI.formatCurrency(state.totals.itemsCost);

    // Grand Total
    document.getElementById('grandTotalDisplay').textContent = UI.formatCurrency(state.totals.grandTotalCost);
  }

  function renderPlatesTable() {
    const tbody = document.querySelector('#platesTable tbody');
    tbody.innerHTML = '';
    
    if (state.plates.length === 0) {
      tbody.innerHTML = '<tr class="empty-state"><td colspan="5">No plates added yet.</td></tr>';
      return;
    }

    state.plates.forEach((plate, index) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>Plate ${index + 1}</td>
        <td>${UI.formatGrams(plate.grams)}</td>
        <td>${UI.formatCurrency(plate.cost)}</td>
        <td>${UI.formatMinsToTime(plate.timeMins)}</td>
        <td style="text-align: center;">
          <button class="btn-remove" onclick="removePlate(${index})">✕</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  function renderItemsTable() {
    const tbody = document.querySelector('#itemsTable tbody');
    tbody.innerHTML = '';
    
    if (state.items.length === 0) {
      tbody.innerHTML = '<tr class="empty-state"><td colspan="5">No items added yet.</td></tr>';
      return;
    }

    state.items.forEach((item, index) => {
      const tr = document.createElement('tr');
      const totalCost = item.qty * item.unitCost;
      tr.innerHTML = `
        <td class="link-cell">${item.link ? `<a href="${item.link}" target="_blank">View Item</a>` : '-'}</td>
        <td>${item.qty}</td>
        <td>${UI.formatCurrency(item.unitCost)}</td>
        <td>${UI.formatCurrency(totalCost)}</td>
        <td style="text-align: center;">
          <button class="btn-remove" onclick="removeItem(${index})">✕</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  window.removePlate = function(index) {
    state.plates.splice(index, 1);
    calculateTotals();
    renderPlatesTable();
  };

  window.removeItem = function(index) {
    state.items.splice(index, 1);
    calculateTotals();
    renderItemsTable();
  };

  // ==========================================
  // 4. Event Listeners
  // ==========================================

  document.addEventListener('DOMContentLoaded', () => {
    
    // Add Plate
    document.getElementById('addPlateBtn').addEventListener('click', () => {
      const gramsInput = document.getElementById('plateGrams');
      const costInput = document.getElementById('plateCost');
      const timeInput = document.getElementById('plateTime');

      if (!gramsInput.value || !costInput.value || !timeInput.value) {
        alert("Please fill all plate fields (Grams, Cost, Time) before adding.");
        return;
      }

      state.plates.push({
        grams: parseFloat(gramsInput.value),
        cost: parseFloat(costInput.value),
        timeMins: UI.parseTimeToMins(timeInput.value),
        originalTimeStr: timeInput.value
      });

      gramsInput.value = '';
      costInput.value = '';
      timeInput.value = '';

      calculateTotals();
      renderPlatesTable();
    });

    // Add Item
    document.getElementById('addItemBtn').addEventListener('click', () => {
      const linkInput = document.getElementById('itemLink');
      const qtyInput = document.getElementById('itemQty');
      const costInput = document.getElementById('itemCost');

      if (!qtyInput.value || !costInput.value) {
        alert("Please fill Quantity and Cost before adding.");
        return;
      }

      state.items.push({
        link: linkInput.value,
        qty: parseInt(qtyInput.value),
        unitCost: parseFloat(costInput.value)
      });

      linkInput.value = '';
      qtyInput.value = '1';
      costInput.value = '';

      calculateTotals();
      renderItemsTable();
    });

    // Save Project
    document.getElementById('saveProjectBtn').addEventListener('click', () => {
      const projectName = document.getElementById('projectName').value;
      const projectLink = document.getElementById('projectLink').value;

      if (!projectName) {
        alert("Project Name is required.");
        return;
      }

      if (state.plates.length === 0 && state.items.length === 0) {
        alert("Add at least one Plate or Item to save the project.");
        return;
      }

      const payload = {
        projectName: projectName,
        projectLink: projectLink,
        grandTotal: state.totals.grandTotalCost,
        plates: state.plates,
        items: state.items
      };

      UI.showLoading();
      google.script.run
        .withSuccessHandler(function() {
          // Reset UI
          document.getElementById('projectName').value = '';
          document.getElementById('projectLink').value = '';
          state.plates = [];
          state.items = [];
          calculateTotals();
          renderPlatesTable();
          renderItemsTable();
          UI.hideLoading();
          alert("Project saved successfully!");
        })
        .withFailureHandler(UI.showError)
        .saveProject(payload);
    });

  });

</script>

</body>
</html>
